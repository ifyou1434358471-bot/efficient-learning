<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - 学习笔记</title>
    <style>
        /* ===== 基础样式重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --primary-light: #34495e;
            --accent: #3498db;
            --accent-light: #5dade2;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.15);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            line-height: 1.8;
            font-size: 16px;
        }

        /* ===== 滚动条美化 ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        /* ===== 封面页 ===== */
        .cover {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            text-align: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .cover::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.5;
        }

        .cover h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            position: relative;
            z-index: 1;
        }

        .cover .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-bottom: 40px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        .cover .meta {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .cover .meta span {
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            cursor: pointer;
            z-index: 1;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* ===== 导航栏 ===== */
        nav {
            background: var(--bg-card);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        nav .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
        }

        nav .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        nav .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        nav .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: var(--transition);
        }

        nav .nav-links a:hover {
            color: var(--accent);
        }

        nav .nav-links a:hover::after {
            width: 100%;
        }

        /* ===== 主体内容区 ===== */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        /* ===== 通用模块样式 ===== */
        .module {
            margin-bottom: 60px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .module h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .module h3 {
            font-size: 1.4rem;
            color: var(--primary-light);
            margin: 30px 0 15px 0;
        }

        /* ===== 卡片样式 ===== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border-left: 4px solid var(--accent);
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .card.example {
            border-left-color: var(--success);
        }

        .card.warning {
            border-left-color: var(--warning);
        }

        .card.danger {
            border-left-color: var(--danger);
        }

        .card-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== 概念定义框 ===== */
        .concept-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: var(--radius);
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }

        .concept-box::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 150px;
            opacity: 0.1;
            font-family: Georgia, serif;
        }

        .concept-box h3 {
            color: white;
            margin-top: 0;
        }

        .concept-box .definition {
            font-size: 1.2rem;
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        /* ===== 要点列表 ===== */
        .key-points {
            list-style: none;
            padding: 0;
        }

        .key-points li {
            padding: 15px 20px;
            margin-bottom: 10px;
            background: var(--bg-main);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            position: relative;
            padding-left: 50px;
        }

        .key-points li::before {
            content: '✓';
            position: absolute;
            left: 20px;
            color: var(--success);
            font-weight: bold;
        }

        /* ===== 记忆法卡片 ===== */
        .memory-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: var(--radius);
            margin: 20px 0;
            position: relative;
        }

        .memory-card .mnemonic {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .memory-card .explanation {
            opacity: 0.95;
            font-size: 0.95rem;
        }

        /* ===== 提示框 ===== */
        .tip {
            background: #e8f5e9;
            border-left: 4px solid var(--success);
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin: 20px 0;
        }

        .tip::before {
            content: '💡 ';
        }

        .caution {
            background: #fff3e0;
            border-left: 4px solid var(--warning);
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin: 20px 0;
        }

        .caution::before {
            content: '⚠️ ';
        }

        /* ===== 图示容器 ===== */
        .diagram-container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius);
            margin: 30px 0;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .diagram-container svg {
            max-width: 100%;
            height: auto;
        }

        .diagram-caption {
            margin-top: 15px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* ===== 练习题 ===== */
        .exercise {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            margin: 20px 0;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .exercise-level {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .level-basic { background: #e8f5e9; color: var(--success); }
        .level-intermediate { background: #fff3e0; color: var(--warning); }
        .level-advanced { background: #ffebee; color: var(--danger); }

        .answer {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg-main);
            border-radius: 8px;
            display: none;
        }

        .answer.show {
            display: block;
        }

        .toggle-answer {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .toggle-answer:hover {
            background: var(--primary);
        }

        /* ===== 对比表格 ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: var(--bg-main);
        }

        /* ===== 知识关联图 ===== */
        .knowledge-map {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius);
            margin: 30px 0;
        }

        .related-concepts {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .concept-tag {
            padding: 10px 20px;
            background: var(--bg-main);
            border-radius: 25px;
            border: 2px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
        }

        .concept-tag:hover {
            border-color: var(--accent);
            background: #e3f2fd;
            transform: translateY(-2px);
        }

        .concept-tag.prerequisite { border-color: var(--success); }
        .concept-tag.extension { border-color: var(--accent); }
        .concept-tag.related { border-color: var(--warning); }

        /* ===== 打印优化 ===== */
        @media print {
            .cover {
                min-height: auto;
                padding: 60px 40px;
                page-break-after: always;
            }

            nav {
                display: none;
            }

            .scroll-indicator {
                display: none;
            }

            main {
                padding: 40px;
            }

            .card, .exercise {
                break-inside: avoid;
            }

            body {
                background: white;
            }
        }

        /* ===== 响应式设计 ===== */
        @media (max-width: 768px) {
            .cover h1 {
                font-size: 2.5rem;
            }

            .cover .subtitle {
                font-size: 1.1rem;
            }

            .cover .meta {
                flex-direction: column;
                gap: 10px;
            }

            nav .nav-links {
                display: none;
            }

            main {
                padding: 30px 20px;
            }

            .module h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 封面页 -->
    <section class="cover">
        <h1>{{TITLE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
        <div class="meta">
            <span>难度：{{DIFFICULTY}}</span>
            <span>预计学习时间：{{ESTIMATED_TIME}}</span>
            <span>生成时间：{{GENERATED_DATE}}</span>
        </div>
        <div class="scroll-indicator">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M19 12l-7 7-7-7"/>
            </svg>
        </div>
    </section>

    <!-- 导航栏 -->
    <nav>
        <div class="nav-content">
            <div class="logo">📚 学习笔记</div>
            <ul class="nav-links">
                <li><a href="#examples">生活化例子</a></li>
                <li><a href="#concept">概念讲解</a></li>
                <li><a href="#memory">简单记法</a></li>
                <li><a href="#diagrams">图示</a></li>
                {{ADDITIONAL_NAV}}
            </ul>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main>
        <!-- 模块一：生活化例子 -->
        <section id="examples" class="module">
            <h2>🌟 生活化例子</h2>
            {{EXAMPLES_CONTENT}}
        </section>

        <!-- 模块二：概念讲解 -->
        <section id="concept" class="module">
            <h2>📚 概念讲解</h2>
            {{CONCEPT_CONTENT}}
        </section>

        <!-- 模块三：简单记法 -->
        <section id="memory" class="module">
            <h2>🧠 简单记法</h2>
            {{MEMORY_CONTENT}}
        </section>

        <!-- 模块四：图示 -->
        <section id="diagrams" class="module">
            <h2>📊 图示</h2>
            {{DIAGRAMS_CONTENT}}
        </section>

        <!-- 扩展模块（可选） -->
        {{EXTENSION_MODULES}}
    </main>

    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // 滚动时导航栏效果
        const nav = document.querySelector('nav');
        let lastScroll = 0;

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            
            if (currentScroll > 100) {
                nav.style.boxShadow = '0 2px 20px rgba(0,0,0,0.1)';
            } else {
                nav.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
            }
            
            lastScroll = currentScroll;
        });

        // 滚动指示器点击
        document.querySelector('.scroll-indicator').addEventListener('click', () => {
            document.querySelector('nav').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
